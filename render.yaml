services:
  - type: web
    name: deploy-major-api
    runtime: node
    rootDir: backend
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRE
        value: 7d
      - key: MAX_FILE_SIZE
        value: "10485760"
      # Set the secret/sensitive values in the Render dashboard, not here:
      #   MONGODB_URL, JWT_SECRET, GEMINI_API_KEY, EMAIL_USER, EMAIL_PASS, CLIENT_URL
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLIENT_URL
        sync: false
