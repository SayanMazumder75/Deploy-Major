<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Stop Recording</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
                width: 100%;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                    Roboto, Helvetica, Arial, sans-serif;
                color: #f3e8ff;
                background: radial-gradient(
                        circle at 30% 20%,
                        rgba(168, 85, 247, 0.35),
                        transparent 65%
                    ),
                    radial-gradient(
                        circle at 70% 90%,
                        rgba(236, 72, 153, 0.3),
                        transparent 65%
                    ),
                    linear-gradient(135deg, #0a031e 0%, #1a063b 100%);
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .card {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding: 14px 18px;
            }
            .row {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 12px;
                color: rgba(255, 255, 255, 0.55);
                letter-spacing: 0.04em;
                font-weight: 600;
                text-transform: uppercase;
            }
            .dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: #ef4444;
                box-shadow: 0 0 12px rgba(239, 68, 68, 0.7);
                animation: pulse 1.2s ease-in-out infinite;
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                    transform: scale(1);
                }
                50% {
                    opacity: 0.4;
                    transform: scale(0.85);
                }
            }
            button {
                border: none;
                font-family: inherit;
                font-weight: 700;
                font-size: 14px;
                color: #fff;
                background: linear-gradient(135deg, #ef4444 0%, #ec4899 100%);
                padding: 12px 28px;
                border-radius: 12px;
                cursor: pointer;
                box-shadow: 0 10px 28px rgba(239, 68, 68, 0.45);
                transition: transform 0.12s ease, box-shadow 0.18s ease,
                    filter 0.18s ease;
                letter-spacing: 0.02em;
            }
            button:hover {
                transform: translateY(-1px);
                filter: brightness(1.08);
            }
            button:active {
                transform: translateY(0);
            }
            button:disabled {
                opacity: 0.55;
                cursor: not-allowed;
                transform: none;
                filter: none;
            }
            .hint {
                font-size: 10.5px;
                color: rgba(255, 255, 255, 0.4);
                letter-spacing: 0.04em;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="row">
                <div class="dot"></div>
                <span>Recording in progress</span>
            </div>
            <button id="stopBtn" type="button">■ Stop Recording</button>
            <div class="hint">This window can stay above your tabs.</div>
        </div>

        <script>
            // The opener (the main app) listens for this message and stops
            // the MediaRecorder. We post to "*" because the parent origin can
            // vary between local dev and production deploys.
            (function () {
                var btn = document.getElementById("stopBtn");
                var sent = false;

                function sendStop() {
                    if (sent) return;
                    sent = true;
                    btn.disabled = true;
                    btn.textContent = "Stopping…";
                    try {
                        if (window.opener && !window.opener.closed) {
                            window.opener.postMessage(
                                { type: "STOP_RECORDING_FROM_POPUP" },
                                "*"
                            );
                        }
                    } catch (e) {
                        /* ignore */
                    }
                    // Close shortly after — give the opener time to act.
                    setTimeout(function () {
                        try {
                            window.close();
                        } catch (e) {}
                    }, 350);
                }

                btn.addEventListener("click", sendStop);

                // If the user closes the window directly, also notify the
                // opener so the recorder doesn't get stuck.
                window.addEventListener("beforeunload", function () {
                    try {
                        if (window.opener && !window.opener.closed) {
                            window.opener.postMessage(
                                { type: "STOP_RECORDING_FROM_POPUP" },
                                "*"
                            );
                        }
                    } catch (e) {}
                });
            })();
        </script>
    </body>
</html>
